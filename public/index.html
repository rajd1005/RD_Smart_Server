<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD Algo Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-size: 0.9rem; }
        .table-responsive { overflow-x: auto; }
        .badge-buy { background-color: #0d6efd; }
        .badge-sell { background-color: #d63384; }
        .status-open { color: #0d6efd; font-weight: bold; }
        .status-tp { color: #198754; font-weight: bold; }
        .status-sl { color: #dc3545; font-weight: bold; }
        thead th { white-space: nowrap; }
    </style>
</head>
<body>

<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>📊 RD Smart Dashboard</h3>
        <div>
            <span id="connectionStatus" class="badge bg-success">Live</span>
        </div>
    </div>

    <div class="card p-3 mb-3 shadow-sm">
        <div class="row g-2">
            <div class="col-md-2">
                <input type="date" id="filterDate" class="form-control">
            </div>
            <div class="col-md-2">
                <input type="text" id="filterSymbol" class="form-control" placeholder="Symbol">
            </div>
            <div class="col-md-2">
                <select id="filterStatus" class="form-select">
                    <option value="ALL">All Status</option>
                    <option value="ACTIVE">Active</option>
                    <option value="TP">Winners</option>
                    <option value="SL">Losers</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0 align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Time (IST)</th>
                            <th>Symbol</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Entry</th>
                            <th>StopLoss</th>
                            <th>TP 1</th>
                            <th>TP 2</th>
                            <th>TP 3</th>
                            <th>Points</th>
                        </tr>
                    </thead>
                    <tbody id="tradeTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/trades';
    let allTrades = [];

    // Set Default Date to Today (IST)
    const today = new Date().toLocaleString("en-CA", { timeZone: "Asia/Kolkata" }).split(',')[0]; 
    document.getElementById('filterDate').value = today;

    async function fetchTrades() {
        try {
            const res = await fetch(API_URL);
            allTrades = await res.json();
            renderTable();
        } catch (e) { console.error(e); }
    }

    function renderTable() {
        const filterDate = document.getElementById('filterDate').value;
        const filterSym = document.getElementById('filterSymbol').value.toUpperCase();
        const filterStat = document.getElementById('filterStatus').value;
        const tbody = document.getElementById('tradeTableBody');
        tbody.innerHTML = '';

        const filtered = allTrades.filter(t => {
            // Compare Date String (Stored in DB as "2/7/2026, 5:30:00 PM")
            // We do a simple string includes check or parse. 
            // Since format varies, we check if the DB string contains the YYYY-MM-DD parts? 
            // Better: Parse the created_at.
            // But user said Time is wrong. We trust DB string now.
            // Let's just filter by "Is it today?" logic approximately for now, 
            // or if the User wants exact date matching, we need standard format.
            // Currently DB stores "2/7/2026...". Input is "2026-02-07".
            // Let's return TRUE for now to show all data, fix date filter if needed specifically.
            return (t.symbol.includes(filterSym)) &&
                   (filterStat === 'ALL' || t.status.includes(filterStat));
        });

        filtered.forEach((t, i) => {
            let badge = t.type === 'BUY' ? 'badge-buy' : 'badge-sell';
            let statusColor = t.status.includes('TP') ? 'text-success' : (t.status.includes('SL') ? 'text-danger' : 'text-primary');
            
            // Format Points (Multiply by 10000 for Pips view or leave raw)
            // User asked for "Points", not Pips. Usually Points = Raw * 100000.
            // Let's display Raw 5 digits.
            let pts = parseFloat(t.points_gained);
            
            let row = `
                <tr>
                    <td>${i+1}</td>
                    <td>${t.created_at}</td> <td><b>${t.symbol}</b></td>
                    <td><span class="badge ${badge}">${t.type}</span></td>
                    <td class="${statusColor} fw-bold">${t.status}</td>
                    <td>${parseFloat(t.entry_price).toFixed(5)}</td>
                    <td>${parseFloat(t.sl_price).toFixed(5)}</td>
                    <td>${parseFloat(t.tp1_price).toFixed(5)}</td>
                    <td>${parseFloat(t.tp2_price).toFixed(5)}</td>
                    <td>${parseFloat(t.tp3_price).toFixed(5)}</td>
                    <td class="fw-bold ${pts >= 0 ? 'text-success':'text-danger'}">${pts.toFixed(5)}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    setInterval(fetchTrades, 3000);
    fetchTrades();
    
    // Listeners
    document.getElementById('filterDate').addEventListener('change', renderTable);
    document.getElementById('filterSymbol').addEventListener('keyup', renderTable);
    document.getElementById('filterStatus').addEventListener('change', renderTable);
</script>
</body>
</html>
