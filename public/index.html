<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD Algo Professional Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-stat { border-left: 5px solid; }
        .status-open { color: #0d6efd; font-weight: bold; }
        .status-tp { color: #198754; font-weight: bold; }
        .status-sl { color: #dc3545; font-weight: bold; }
        .status-closed { color: #6c757d; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 RD Algo Professional Dashboard</h2>
        <button onclick="refreshData()" class="btn btn-primary">Refresh Data</button>
    </div>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card p-3 card-stat border-primary">
                <h5>Total Trades</h5>
                <h3 id="totalTrades">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 card-stat border-success">
                <h5>Win Rate</h5>
                <h3 id="winRate">0%</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 card-stat border-warning">
                <h5>Total Pips</h5>
                <h3 id="totalPips">0</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 card-stat border-info">
                <h5>Active Trades</h5>
                <h3 id="activeTrades">0</h3>
            </div>
        </div>
    </div>

    <div class="card p-3 mb-4">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Filter Date</label>
                <input type="date" id="filterDate" class="form-control">
            </div>
            <div class="col-md-3">
                 <label class="form-label">Search Symbol</label>
                <input type="text" id="filterSymbol" class="form-control" placeholder="e.g. GOLD">
            </div>
            <div class="col-md-3">
                 <label class="form-label">Status</label>
                <select id="filterStatus" class="form-select">
                    <option value="ALL">All Statuses</option>
                    <option value="OPEN">Open</option>
                    <option value="TP">Winners (TP Hit)</option>
                    <option value="SL">Losers (SL Hit)</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label" style="visibility:hidden">Reset</label>
                <button onclick="resetFilters()" class="btn btn-outline-secondary w-100">Reset to Today</button>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Time (IST)</th>
                        <th>Symbol</th>
                        <th>Type</th>
                        <th>Entry</th>
                        <th>Status</th>
                        <th>Pips</th>
                    </tr>
                </thead>
                <tbody id="tradeTableBody">
                    </tbody>
            </table>
            <div id="noDataMessage" class="text-center p-3 text-muted" style="display:none;">
                No trades found for this date.
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
